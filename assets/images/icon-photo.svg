
<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0.25" stop-color="#FFDB6E"/>
      <stop offset="1" stop-color="#FFBC5E"/>
    </linearGradient>
  </defs>

  <circle cx="20" cy="20" r="18" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-dasharray="90 20"/>

  <!-- dashboard -->
  <rect x="10" y="10" width="20" height="14" rx="2" stroke="url(#gold)" stroke-width="1.8"/>

  <!-- bars -->
  <path d="M13 21V18" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M16 21V16" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M19 21V14" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- trend line -->
  <polyline points="13,15 16,13 18,14 22,11" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="13" cy="15" r="0.7" fill="url(#gold)"/>
  <circle cx="16" cy="13" r="0.7" fill="url(#gold)"/>
  <circle cx="18" cy="14" r="0.7" fill="url(#gold)"/>
  <circle cx="22" cy="11" r="0.7" fill="url(#gold)"/>

  <!-- pie chart -->
  <circle cx="26" cy="15" r="3" stroke="url(#gold)" stroke-width="1.4"/>
  <path d="M26 12V15H29" stroke="url(#gold)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- database -->
  <ellipse cx="25" cy="29" rx="4" ry="1.3" stroke="url(#gold)" stroke-width="1.4"/>
  <path d="M21 29V33C21 33.8 22.8 34.5 25 34.5C27.2 34.5 29 33.8 29 33V29" stroke="url(#gold)" stroke-width="1.4"/>
  <path d="M21 31C21 31.8 22.8 32.5 25 32.5C27.2 32.5 29 31.8 29 31" stroke="url(#gold)" stroke-width="1.4"/>

  <!-- magnifier -->

  <path d="M16 31L18 33" stroke="url(#gold)" stroke-width="1.6" stroke-linecap="round"/>

  <circle cx="31" cy="10" r="1.2" fill="url(#gold)"/>
  <circle cx="9" cy="31" r="1.2" fill="url(#gold)"/>
